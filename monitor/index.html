<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>가격 모니터링</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Malgun Gothic', 'Noto Sans KR', sans-serif; background: #f0f4ff; min-height: 100vh; }

    /* 네비게이션 바 */
    .navbar {
      background: #1e3a8a;
      padding: 0 20px;
      display: flex;
      align-items: center;
      height: 52px;
      gap: 4px;
    }
    .navbar a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 8px;
      transition: all 0.15s;
    }
    .navbar a:hover { color: white; background: rgba(255,255,255,0.12); }
    .navbar a.active { color: white; background: rgba(255,255,255,0.2); font-weight: 700; }

    .container { max-width: 860px; margin: 0 auto; padding: 32px 20px; }
    h1 { color: #1e3a8a; font-size: 22px; font-weight: 700; margin-bottom: 24px; }

    /* 상품 추가 폼 */
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      padding: 24px;
      margin-bottom: 20px;
    }
    .card h2 { font-size: 15px; font-weight: 700; color: #374151; margin-bottom: 16px; }
    .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .form-row input {
      flex: 1;
      min-width: 140px;
      padding: 10px 14px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-row input:focus { border-color: #3b82f6; }
    .btn-add {
      background: #1e3a8a;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 22px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .btn-add:hover { background: #1d4ed8; }
    .btn-add:disabled { background: #93c5fd; cursor: not-allowed; }

    /* 상품 테이블 */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    thead th {
      background: #1e3a8a;
      color: white;
      padding: 11px 14px;
      text-align: left;
      font-size: 13px;
      font-weight: 600;
    }
    thead th:last-child { text-align: center; width: 60px; }
    tbody tr { border-bottom: 1px solid #f1f5f9; transition: background 0.1s; }
    tbody tr:hover { background: #f8faff; }
    tbody td { padding: 12px 14px; color: #374151; vertical-align: middle; }
    .product-name { font-weight: 600; color: #1e3a8a; }
    .product-url {
      color: #6b7280;
      font-size: 12px;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .product-url a { color: #6b7280; text-decoration: none; }
    .product-url a:hover { color: #3b82f6; text-decoration: underline; }

    /* 상태 배지 */
    .status { font-size: 13px; font-weight: 500; }
    .status-instock { color: #374151; }
    .status-down { color: #16a34a; }
    .status-up { color: #dc2626; }
    .status-soldout { color: #6b7280; }
    .status-unknown { color: #9ca3af; }

    /* 삭제 버튼 */
    .btn-del {
      background: #fee2e2;
      color: #ef4444;
      border: none;
      border-radius: 7px;
      padding: 5px 11px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
      display: block;
      margin: 0 auto;
    }
    .btn-del:hover { background: #fecaca; }

    /* 빈 목록 */
    .empty {
      text-align: center;
      padding: 48px 20px;
      color: #9ca3af;
      font-size: 14px;
    }

    /* 새로고침 타이머 */
    .refresh-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .refresh-info { font-size: 12px; color: #9ca3af; }
    .btn-refresh {
      background: #f1f5f9;
      color: #64748b;
      border: none;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .btn-refresh:hover { background: #e2e8f0; }

    /* 로딩 */
    .loading { text-align: center; padding: 32px; color: #9ca3af; font-size: 14px; }

    /* 오류 배너 */
    .error-banner {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 10px;
      padding: 12px 16px;
      color: #b91c1c;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    @media (max-width: 600px) {
      .form-row { flex-direction: column; }
      .btn-add { width: 100%; }
      thead th:nth-child(2) { display: none; }
      tbody td:nth-child(2) { display: none; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="../">스펙 이미지 제작기</a>
  <a href="./" class="active">가격 모니터링</a>
</nav>

<div class="container">
  <h1>가격 모니터링</h1>

  <!-- 상품 추가 폼 -->
  <div class="card">
    <h2>상품 추가</h2>
    <div class="form-row">
      <input type="text" id="inputUrl" placeholder="상품 URL을 입력하세요" />
      <button class="btn-add" id="btnAdd" onclick="addProduct()">+ 추가</button>
    </div>
    <p style="margin-top:8px;font-size:12px;color:#9ca3af;">URL 입력 후 추가하면 상품명을 자동으로 가져옵니다.</p>
  </div>

  <!-- 오류 배너 -->
  <div class="error-banner" id="errorBanner"></div>

  <!-- 상품 목록 -->
  <div class="card">
    <div class="refresh-bar">
      <span class="refresh-info" id="refreshInfo">불러오는 중...</span>
      <button class="btn-refresh" onclick="loadProducts()">새로고침</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>상품명</th>
            <th>URL</th>
            <th>상태</th>
            <th>삭제</th>
          </tr>
        </thead>
        <tbody id="productBody">
          <tr><td colspan="4"><div class="loading">불러오는 중...</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const API = 'https://car-join-handhelds-mitchell.trycloudflare.com';
  let refreshTimer = null;

  /* 상태 문자열을 HTML 뱃지로 변환 */
  function renderStatus(display) {
    if (!display || display === '확인중') {
      return '<span class="status status-unknown">확인중</span>';
    }
    if (display === '품절') {
      return '<span class="status status-soldout">품절</span>';
    }
    if (display.includes('▼')) {
      return `<span class="status status-down">${display}</span>`;
    }
    if (display.includes('▲')) {
      return `<span class="status status-up">${display}</span>`;
    }
    return `<span class="status status-instock">${display}</span>`;
  }

  /* 상품 목록 로드 */
  async function loadProducts() {
    clearInterval(refreshTimer);
    document.getElementById('refreshInfo').textContent = '불러오는 중...';
    hideError();

    try {
      const res = await fetch(`${API}/api/products`);
      if (!res.ok) throw new Error(`서버 오류 (${res.status})`);
      const products = await res.json();
      renderTable(products);
      startCountdown();
    } catch (e) {
      showError(`API 연결 실패: ${e.message}`);
      document.getElementById('productBody').innerHTML =
        '<tr><td colspan="4"><div class="empty">데이터를 불러올 수 없습니다.</div></td></tr>';
      startCountdown();
    }
  }

  /* 테이블 렌더링 */
  function renderTable(products) {
    const tbody = document.getElementById('productBody');
    if (!products.length) {
      tbody.innerHTML = '<tr><td colspan="4"><div class="empty">등록된 상품이 없습니다.<br>위 폼에서 상품을 추가해보세요.</div></td></tr>';
      return;
    }
    tbody.innerHTML = products.map(p => `
      <tr>
        <td class="product-name">${escHtml(p.name)}</td>
        <td class="product-url"><a href="${escHtml(p.url)}" target="_blank" rel="noopener">${escHtml(p.url)}</a></td>
        <td>${renderStatus(p.status_display)}</td>
        <td><button class="btn-del" onclick="deleteProduct('${p.id}', '${escHtml(p.name)}')">삭제</button></td>
      </tr>
    `).join('');
  }

  /* 상품 추가 (URL만 입력, 상품명은 서버에서 자동 추출) */
  async function addProduct() {
    const url = document.getElementById('inputUrl').value.trim();
    if (!url) { alert('상품 URL을 입력해주세요.'); return; }

    const btn = document.getElementById('btnAdd');
    btn.disabled = true;
    btn.textContent = '상품명 추출 중...';
    hideError();

    try {
      const res = await fetch(`${API}/api/products`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url }),
      });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || `서버 오류 (${res.status})`);
      }
      document.getElementById('inputUrl').value = '';
      await loadProducts();
    } catch (e) {
      showError(`추가 실패: ${e.message}`);
    } finally {
      btn.disabled = false;
      btn.textContent = '+ 추가';
    }
  }

  /* 상품 삭제 */
  async function deleteProduct(id, name) {
    if (!confirm(`"${name}" 상품을 삭제할까요?`)) return;
    hideError();

    try {
      const res = await fetch(`${API}/api/products/${id}`, { method: 'DELETE' });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || `서버 오류 (${res.status})`);
      }
      await loadProducts();
    } catch (e) {
      showError(`삭제 실패: ${e.message}`);
    }
  }

  /* 매시 정각(1:00, 2:00, ...) 자동 새로고침 카운트다운 */
  function startCountdown() {
    const info = document.getElementById('refreshInfo');
    const updatedAt = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

    refreshTimer = setInterval(() => {
      const now = new Date();
      const secondsUntilNextHour = (59 - now.getMinutes()) * 60 + (60 - now.getSeconds());

      if (secondsUntilNextHour <= 0) {
        clearInterval(refreshTimer);
        loadProducts();
        return;
      }

      const m = String(Math.floor(secondsUntilNextHour / 60)).padStart(2, '0');
      const s = String(secondsUntilNextHour % 60).padStart(2, '0');
      info.textContent = `마지막 업데이트: ${updatedAt} · 다음 정각까지 ${m}:${s}`;
    }, 1000);
  }

  function showError(msg) {
    const el = document.getElementById('errorBanner');
    el.textContent = msg;
    el.style.display = 'block';
  }
  function hideError() {
    document.getElementById('errorBanner').style.display = 'none';
  }

  /* XSS 방지 */
  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* Enter 키로 추가 */
  document.getElementById('inputUrl').addEventListener('keydown', e => {
    if (e.key === 'Enter') addProduct();
  });

  /* 초기 로드 */
  loadProducts();
</script>
</body>
</html>
