<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>스펙 이미지 제작기</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Malgun Gothic', 'Noto Sans KR', sans-serif; background: #f0f4ff; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 40px 20px; }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); width: 100%; max-width: 820px; }
        h1 { color: #1e3a8a; font-size: 24px; margin-bottom: 24px; font-weight: bold; text-align: center; }
        label { font-size: 13px; font-weight: bold; color: #374151; margin-bottom: 6px; display: block; }
        input[type="text"] { width: 100%; padding: 14px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 15px; font-family: 'Malgun Gothic', 'Noto Sans KR', sans-serif; outline: none; margin-bottom: 16px; }
        input[type="text"]:focus { border-color: #3b82f6; }
        textarea { width: 100%; padding: 14px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 14px; font-family: 'Malgun Gothic', 'Noto Sans KR', sans-serif; outline: none; height: 200px; resize: vertical; margin-bottom: 16px; }
        textarea:focus { border-color: #3b82f6; }
        button { background: #1e3a8a; color: white; border: none; padding: 14px 24px; border-radius: 10px; font-size: 15px; cursor: pointer; font-weight: bold; font-family: 'Malgun Gothic', 'Noto Sans KR', sans-serif; width: 100%; margin-bottom: 20px; }
        button:hover { background: #1d4ed8; }
        .canvas-wrap { border: 2px dashed #e5e7eb; border-radius: 12px; min-height: 200px; display: flex; align-items: flex-start; justify-content: center; margin-bottom: 20px; background: #f9fafb; padding: 10px; }
        canvas { max-width: 100%; display: block; }
        .placeholder { color: #9ca3af; font-size: 14px; text-align: center; padding: 40px; align-self: center; }
        .dl-btn { display: none; width: 100%; padding: 16px; background: #22c55e; color: white; border: none; border-radius: 10px; font-size: 17px; font-weight: bold; cursor: pointer; font-family: 'Malgun Gothic', 'Noto Sans KR', sans-serif; }
        .dl-btn:hover { background: #16a34a; }
    </style>
</head>
<body>
<div class="container">
    <h1>🚀 우리 회사 전용 스펙 이미지 제작기</h1>

    <label>모델명</label>
    <input type="text" id="modelInput" placeholder="모델명 입력 (예: 75UT9300BNA)">

    <label>다나와/에누리에서 복사한 스펙 텍스트</label>
    <textarea id="specInput" placeholder="스펙 텍스트를 여기에 붙여넣으세요."></textarea>

    <button onclick="generateImage()">✨ 이미지 생성</button>

    <div class="canvas-wrap" id="canvasWrap">
        <div class="placeholder" id="placeholder">모델명과 스펙을 입력하고 생성 버튼을 누르면 여기에 이미지가 생성됩니다.</div>
    </div>
    <button class="dl-btn" id="dlBtn" onclick="downloadImage()">💾 고화질 이미지 다운로드</button>
</div>

<script>
function extractSpecs(text, modelName) {
    const get = (keys) => {
        for (const key of keys) {
            const regex = new RegExp(key + '[\\s\\t]*([^\\t\\n]+)', 'i');
            const match = text.match(regex);
            if (match) return match[1].trim();
        }
        return '상세페이지 참조';
    };

    const size = get(['크기\\(가로x세로x깊이\\)', '크기', '외관크기', '제품크기']);
    const weight = get(['무게']);
    const power = get(['소비전력']);
    const energy = get(['에너지효율', '에너지소비효율']);
    const voltage = get(['정격전압', '전압']);
    const madeIn = get(['제조국', '원산지']);
    const manufacturer = get(['제조사', '제조자', '브랜드']);
    const releaseDate = get(['년형', '출시년도', '출시년월']);
    const asCenter = get(['A/S', 'AS', '고객센터']);

    // 화면크기 또는 용량 판단
    const screenSize = get(['화면크기', '화면 크기']);
    const capacity = get(['냉방용량', '세탁용량', '용량']);
    let capacityLabel = '주요 사양';
    let capacityVal = '상세페이지 참조';

    if (screenSize !== '상세페이지 참조') {
        capacityLabel = '화면 크기';
        capacityVal = screenSize;
    } else if (capacity !== '상세페이지 참조') {
        capacityLabel = '주요 용량';
        capacityVal = capacity;
    }

    return {
        emcCert: '상세페이지 참조',
        safetyCert: '상세페이지 참조',
        size,
        weight,
        capacityLabel,
        capacity: capacityVal,
        voltage: voltage !== '상세페이지 참조' ? voltage : '220V~, 60Hz',
        power,
        releaseDate,
        manufacturer: manufacturer !== '상세페이지 참조' ? manufacturer : 'LG전자 / 삼성전자 등',
        energyGrade: energy,
        madeIn,
        asCenter: asCenter !== '상세페이지 참조' ? asCenter : '제조사 고객센터',
        warranty: '소비자분쟁해결기준(소비자기본법 제16조)에 따라 보상 가능'
    };
}

function drawSpecImage(modelName, specs) {
    const FONT = '"Malgun Gothic", "Noto Sans KR", sans-serif';
    const SCALE = 3;

    const rows = [
        ["전자파 적합성 인증(등록) 번호", specs.emcCert],
        ["전기용품 안전인증(확인신고) 번호", specs.safetyCert],
        ["크기 (WxHxD)", specs.size],
        ["무게 (kg)", specs.weight],
        [specs.capacityLabel, specs.capacity],
        ["정격전압 (V/Hz)", specs.voltage],
        ["소비전력 (W)", specs.power],
        ["동일모델의 출시년월", specs.releaseDate],
        ["제조자 (수입자)", specs.manufacturer],
        ["에너지 소비효율등급", specs.energyGrade],
        ["제조국", specs.madeIn],
        ["A/S 책임자와 전화번호", specs.asCenter],
        ["품질보증기준", specs.warranty]
    ];

    const W = 750, col1W = 260, headerH = 54, rowH = 42, lastRowH = 65, footerH = 50;
    const H = headerH + (rows.length - 1) * rowH + lastRowH + footerH;

    const canvas = document.createElement('canvas');
    canvas.width = W * SCALE;
    canvas.height = H * SCALE;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';

    const ctx = canvas.getContext('2d');
    ctx.scale(SCALE, SCALE);

    ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#1e3a8a'; ctx.fillRect(0, 0, W, headerH);
    ctx.fillStyle = '#ffffff';
    ctx.font = `bold 16px ${FONT}`;
    ctx.fillText('고지정보', 20, 34);

    rows.forEach((row, i) => {
        const isLast = i === rows.length - 1;
        const rH = isLast ? lastRowH : rowH;
        const y = headerH + i * rowH;

        ctx.fillStyle = i % 2 === 0 ? '#f7f9ff' : '#ffffff';
        ctx.fillRect(0, y, W, rH);
        ctx.strokeStyle = '#dde4f0'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(col1W, y); ctx.lineTo(col1W, y + rH); ctx.stroke();

        ctx.fillStyle = '#374151';
        ctx.font = `bold 12px ${FONT}`;
        ctx.fillText(row[0], 14, y + 26);

        ctx.fillStyle = '#111827';
        ctx.font = `13px ${FONT}`;

        if (isLast) {
            const maxW = W - col1W - 20;
            const words = row[1].split(' ');
            let line = '', lines = [];
            for (const w of words) {
                const test = line ? line + ' ' + w : w;
                if (ctx.measureText(test).width > maxW && line) { lines.push(line); line = w; }
                else line = test;
            }
            if (line) lines.push(line);
            lines.forEach((l, li) => ctx.fillText(l, col1W + 14, y + 20 + li * 22));
        } else {
            ctx.fillText(row[1] || '', col1W + 14, y + 26);
        }
    });

    const bottomY = headerH + (rows.length - 1) * rowH + lastRowH;
    ctx.strokeStyle = '#dde4f0'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, bottomY); ctx.lineTo(W, bottomY); ctx.stroke();

    ctx.fillStyle = '#6b7280';
    ctx.font = `12px ${FONT}`;
    ctx.textAlign = 'center';
    ctx.fillText('해당 모델의 제품 상세 이미지 및 제품 정보는 제조사 홈페이지 또는 매장에서 확인 바랍니다.', W / 2, bottomY + 30);
    ctx.textAlign = 'left';

    ctx.strokeStyle = '#1e3a8a'; ctx.lineWidth = 2;
    ctx.strokeRect(1, 1, W - 2, H - 2);

    return canvas;
}

let generatedCanvas = null;

function generateImage() {
    const modelName = document.getElementById('modelInput').value.trim();
    const specText = document.getElementById('specInput').value.trim();

    if (!modelName) { alert('모델명을 입력해주세요!'); return; }
    if (!specText) { alert('스펙 텍스트를 붙여넣어주세요!'); return; }

    const wrap = document.getElementById('canvasWrap');
    const old = wrap.querySelector('canvas');
    if (old) wrap.removeChild(old);
    document.getElementById('placeholder').style.display = 'none';

    const specs = extractSpecs(specText, modelName);

    document.fonts.ready.then(() => {
        generatedCanvas = drawSpecImage(modelName, specs);
        wrap.appendChild(generatedCanvas);
        document.getElementById('dlBtn').style.display = 'block';
    });
}

function downloadImage() {
    if (!generatedCanvas) return;
    const modelName = document.getElementById('modelInput').value.trim().toUpperCase();
    const link = document.createElement('a');
    link.download = `고지정보_${modelName}.png`;
    link.href = generatedCanvas.toDataURL('image/png');
    link.click();
}
</script>
</body>
</html>
