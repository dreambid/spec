<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>스펙 이미지 제작기</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Malgun Gothic', 'Noto Sans KR', sans-serif; background: #f0f4ff; min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #1e3a8a; font-size: 24px; margin-bottom: 24px; font-weight: bold; text-align: center; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); margin-bottom: 20px; }
        label { font-size: 13px; font-weight: bold; color: #374151; margin-bottom: 6px; display: block; }
        .step-hint { font-size: 12px; color: #9ca3af; margin-bottom: 10px; }
        input[type="text"] { width: 100%; padding: 12px 14px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 15px; font-family: inherit; outline: none; margin-bottom: 16px; }
        input[type="text"]:focus { border-color: #3b82f6; }
        textarea { width: 100%; padding: 12px 14px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 13px; font-family: inherit; outline: none; height: 160px; resize: vertical; }
        textarea:focus { border-color: #3b82f6; }
        .btn { border: none; padding: 12px 20px; border-radius: 10px; font-size: 14px; cursor: pointer; font-weight: bold; font-family: inherit; transition: all 0.2s; }
        .btn-primary { background: #1e3a8a; color: white; width: 100%; margin-top: 12px; padding: 14px; font-size: 15px; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-green { background: #22c55e; color: white; width: 100%; padding: 14px; font-size: 15px; margin-top: 8px; }
        .btn-green:hover { background: #16a34a; }
        .btn-blue { background: #3b82f6; color: white; flex: 1; }
        .btn-blue:hover { background: #2563eb; }
        .btn-row { display: flex; gap: 10px; margin-top: 12px; }
        .spec-table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
        .spec-table th { background: #1e3a8a; color: white; padding: 10px 14px; font-size: 13px; text-align: left; }
        .spec-table td { padding: 5px 6px; border-bottom: 1px solid #e5e7eb; }
        .spec-table tr:nth-child(even) td { background: #f8faff; }
        .spec-table td input[type="text"] { width: 100%; padding: 6px 8px; border: 1px solid transparent; border-radius: 6px; font-size: 13px; font-family: inherit; background: transparent; margin: 0; }
        .spec-table td input[type="text"]:focus { border-color: #3b82f6; background: white; outline: none; }
        .btn-del { background: #fee2e2; color: #ef4444; border: none; border-radius: 6px; padding: 4px 8px; cursor: pointer; font-size: 11px; }
        .btn-del:hover { background: #fecaca; }
        .btn-add { background: #f0f9ff; color: #0284c7; border: 1px dashed #0284c7; border-radius: 8px; padding: 8px; font-size: 13px; cursor: pointer; width: 100%; font-family: inherit; margin-bottom: 4px; }
        .btn-add:hover { background: #e0f2fe; }
        .preview-wrap { border: 2px dashed #e5e7eb; border-radius: 12px; background: #f9fafb; padding: 16px; display: flex; justify-content: center; align-items: flex-start; min-height: 150px; overflow: auto; }
        canvas { display: block; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        .badge { display: inline-block; background: #dbeafe; color: #1d4ed8; font-size: 11px; font-weight: bold; padding: 2px 8px; border-radius: 20px; margin-bottom: 8px; }
        .slider-wrap { background: #f8faff; border-radius: 12px; padding: 20px; margin: 16px 0; }
        .slider-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
        .slider-row:last-child { margin-bottom: 0; }
        .slider-label { font-size: 13px; font-weight: bold; color: #374151; width: 40px; }
        .slider-row input[type="range"] { flex: 1; height: 6px; accent-color: #1e3a8a; cursor: pointer; margin: 0; }
        .slider-val { font-size: 13px; font-weight: bold; color: #1e3a8a; width: 48px; text-align: right; }
        .btn-reset { background: #f1f5f9; color: #64748b; border: none; border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer; font-family: inherit; }
        .btn-reset:hover { background: #e2e8f0; }
    </style>
</head>
<body>
<div class="container">
    <h1>🚀 스펙 이미지 제작기</h1>

    <!-- Step 1 -->
    <div class="card">
        <span class="badge">STEP 1</span>
        <label>다나와 / 에누리 전체 텍스트 붙여넣기</label>
        <p class="step-hint">제품 페이지 전체를 복사해서 붙여넣으세요. 제품명은 자동으로 추출돼요!</p>
        <textarea id="rawText" placeholder="여기에 붙여넣으세요..."></textarea>
        <button class="btn btn-primary" onclick="parseSpec()">📋 스펙 파싱하기</button>
    </div>

    <!-- Step 2 -->
    <div class="card hidden" id="editCard">
        <span class="badge">STEP 2</span>
        <label>제품명 확인 및 수정</label>
        <p class="step-hint">자동으로 추출된 제품명이에요. 잘못됐으면 직접 수정해주세요!</p>
        <input type="text" id="productName" placeholder="제품명">

        <label>스펙 확인 및 수정</label>
        <p class="step-hint">항목명과 값을 클릭해서 직접 수정할 수 있어요. 행 추가/삭제도 가능해요.</p>
        <table class="spec-table" id="specTable">
            <thead>
                <tr>
                    <th style="width:38%">항목</th>
                    <th>내용</th>
                    <th style="width:36px"></th>
                </tr>
            </thead>
            <tbody id="specBody"></tbody>
        </table>
        <button class="btn-add" onclick="addRow()">+ 행 추가</button>
        <div class="btn-row">
            <button class="btn btn-blue" onclick="generatePreview()">🖼 고화질 이미지 만들기</button>
        </div>
    </div>

    <!-- Step 3 -->
    <div class="card hidden" id="previewCard">
        <span class="badge">STEP 3</span>
        <label>이미지 미리보기</label>
        <div class="preview-wrap" id="previewWrap"></div>

        <!-- 크기 조절 슬라이더 -->
        <div class="slider-wrap">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                <span style="font-size:13px; font-weight:bold; color:#374151;">📐 이미지 크기 조절</span>
                <button class="btn-reset" onclick="resetSliders()">초기화</button>
            </div>
            <div class="slider-row">
                <span class="slider-label">가로</span>
                <input type="range" id="sliderW" min="50" max="150" value="100" oninput="updateSlider()">
                <span class="slider-val" id="valW">100%</span>
            </div>
            <div class="slider-row">
                <span class="slider-label">세로</span>
                <input type="range" id="sliderH" min="50" max="150" value="100" oninput="updateSlider()">
                <span class="slider-val" id="valH">100%</span>
            </div>
        </div>

        <button class="btn btn-green" onclick="downloadImage()">💾 고화질 이미지 다운로드</button>
    </div>
</div>

<script>
let parsedRows = [];
let baseProductName = '';

function parseSpec() {
    const raw = document.getElementById('rawText').value.trim();
    if (!raw) { alert('텍스트를 붙여넣어주세요!'); return; }

    const firstLine = raw.split('\n')[0].trim();
    document.getElementById('productName').value = firstLine;

    const marker = '상품 상세 정보 제공';
    const idx = raw.indexOf(marker);
    const specText = idx >= 0 ? raw.substring(idx + marker.length) : raw;

    const rows = [];
    const lines = specText.split('\n');

    const skipHeaders = ['KC인증','AI기능','세탁코스','세탁방식','조작부','스마트기능','HDMI/USB','지원','추가단자','부가','화질','사운드','게이밍기능','편의기능','냉각','아이스메이커','위생','AI스마트','안전장치','처리기능','투입위치','내부기능','기본','스마트','냉각','규격','사운드'];

    let inKC = false;

    for (let line of lines) {
        line = line.trim();
        if (!line) continue;
        if (line === 'KC인증') { inKC = true; continue; }
        if (skipHeaders.includes(line)) continue;

        const parts = line.split('\t').map(s => s.trim()).filter(s => s);
        if (parts.length === 0) continue;

        if (inKC) {
            for (let i = 0; i < parts.length - 1; i += 2) {
                let key = parts[i];
                let val = (parts[i+1] || '').replace('인증번호 확인', '').trim();
                if (val === '상세설명 / 판매 사이트 문의') val = '상세페이지 참조';
                if (key && val) rows.push([key, val]);
            }
        } else {
            for (let i = 0; i < parts.length - 1; i += 2) {
                let key = parts[i];
                let val = (parts[i+1] || '')
                    .replace(/\(제조사 웹사이트 바로가기\)/g, '')
                    .replace('인증번호 확인', '')
                    .trim();
                if (!key || !val) continue;
                if (val.length > 80) continue;
                rows.push([key, val]);
            }
        }
    }

    parsedRows = rows;
    renderTable(rows);
    document.getElementById('editCard').classList.remove('hidden');
    document.getElementById('previewCard').classList.add('hidden');
    document.getElementById('editCard').scrollIntoView({ behavior: 'smooth' });
}

function renderTable(rows) {
    const tbody = document.getElementById('specBody');
    tbody.innerHTML = '';
    rows.forEach((row, i) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><input type="text" value="${esc(row[0])}" data-i="${i}" data-col="0"></td>
            <td><input type="text" value="${esc(row[1])}" data-i="${i}" data-col="1"></td>
            <td><button class="btn-del" onclick="deleteRow(${i})">✕</button></td>
        `;
        tbody.appendChild(tr);
    });
}

function esc(s) { return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function deleteRow(i) {
    syncFromTable();
    parsedRows.splice(i, 1);
    renderTable(parsedRows);
}

function addRow() {
    syncFromTable();
    parsedRows.push(['항목명', '내용']);
    renderTable(parsedRows);
}

function syncFromTable() {
    const inputs = document.querySelectorAll('#specBody input[type="text"]');
    inputs.forEach(inp => {
        const i = parseInt(inp.dataset.i);
        const col = parseInt(inp.dataset.col);
        if (parsedRows[i]) parsedRows[i][col] = inp.value;
    });
}

function generatePreview() {
    syncFromTable();
    baseProductName = document.getElementById('productName').value.trim();
    if (!baseProductName) { alert('제품명을 확인해주세요!'); return; }

    // 슬라이더 초기화
    document.getElementById('sliderW').value = 100;
    document.getElementById('sliderH').value = 100;
    document.getElementById('valW').innerText = '100%';
    document.getElementById('valH').innerText = '100%';

    redrawCanvas(100, 100);

    document.getElementById('previewCard').classList.remove('hidden');
    document.getElementById('previewCard').scrollIntoView({ behavior: 'smooth' });
}

function updateSlider() {
    const wPct = parseInt(document.getElementById('sliderW').value);
    const hPct = parseInt(document.getElementById('sliderH').value);
    document.getElementById('valW').innerText = wPct + '%';
    document.getElementById('valH').innerText = hPct + '%';
    redrawCanvas(wPct, hPct);
}

function resetSliders() {
    document.getElementById('sliderW').value = 100;
    document.getElementById('sliderH').value = 100;
    document.getElementById('valW').innerText = '100%';
    document.getElementById('valH').innerText = '100%';
    redrawCanvas(100, 100);
}

function redrawCanvas(wPct, hPct) {
    const canvas = drawImage(baseProductName, parsedRows, wPct, hPct);
    window._canvas = canvas;
    const wrap = document.getElementById('previewWrap');
    wrap.innerHTML = '';
    canvas.style.maxWidth = '100%';
    wrap.appendChild(canvas);
}

function drawImage(productName, rows, wPct = 100, hPct = 100) {
    const FONT = '"Malgun Gothic", "Noto Sans KR", sans-serif';
    const SCALE = 3;
    const baseW = 750;
    const baseRowH = 40;
    const baseHeaderH = 72;
    const baseFooterH = 48;
    const baseCol1W = 230;

    const W = Math.round(baseW * wPct / 100);
    const rowH = Math.round(baseRowH * hPct / 100);
    const headerH = Math.round(baseHeaderH * hPct / 100);
    const footerH = Math.round(baseFooterH * hPct / 100);
    const col1W = Math.round(baseCol1W * wPct / 100);
    const H = headerH + rows.length * rowH + footerH;

    const fontSize = Math.round(13 * Math.min(wPct, hPct) / 100);
    const fontSizeSm = Math.round(12 * Math.min(wPct, hPct) / 100);
    const fontSizeLg = Math.round(18 * Math.min(wPct, hPct) / 100);

    const canvas = document.createElement('canvas');
    canvas.width = W * SCALE;
    canvas.height = H * SCALE;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';

    const ctx = canvas.getContext('2d');
    ctx.scale(SCALE, SCALE);

    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, W, H);

    // Header
    ctx.fillStyle = '#1e3a8a';
    ctx.fillRect(0, 0, W, headerH);
    ctx.fillStyle = '#3b82f6';
    ctx.fillRect(0, headerH - 3, W, 3);

    ctx.fillStyle = '#ffffff';
    ctx.font = `bold ${fontSizeLg}px ${FONT}`;
    ctx.textAlign = 'left';
    ctx.fillText(productName, 20, headerH * 0.52);

    ctx.font = `${fontSizeSm}px ${FONT}`;
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.fillText('제품 상세 고지정보', 20, headerH * 0.82);

    // Rows
    rows.forEach((row, i) => {
        const y = headerH + i * rowH;
        ctx.fillStyle = i % 2 === 0 ? '#f7f9ff' : '#ffffff';
        ctx.fillRect(0, y, W, rowH);

        ctx.strokeStyle = '#e8ecf5';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(col1W, y); ctx.lineTo(col1W, y + rowH); ctx.stroke();

        ctx.fillStyle = '#1e3a8a';
        ctx.font = `bold ${fontSizeSm}px ${FONT}`;
        ctx.textAlign = 'left';
        ctx.fillText(row[0], 14, y + rowH * 0.62);

        ctx.fillStyle = '#1f2937';
        ctx.font = `${fontSize}px ${FONT}`;
        ctx.fillText(row[1], col1W + 12, y + rowH * 0.62);
    });

    const tableBottom = headerH + rows.length * rowH;
    ctx.strokeStyle = '#e8ecf5';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, tableBottom); ctx.lineTo(W, tableBottom); ctx.stroke();

    // Footer
    ctx.fillStyle = '#f8faff';
    ctx.fillRect(0, tableBottom, W, footerH);

    ctx.font = `${fontSizeSm}px ${FONT}`;
    ctx.fillStyle = '#94a3b8';
    ctx.textAlign = 'right';
    ctx.fillText('design by', W - Math.round(68 * wPct / 100), tableBottom + footerH * 0.62);

    ctx.font = `bold ${fontSize}px ${FONT}`;
    ctx.fillStyle = '#1e3a8a';
    ctx.textAlign = 'right';
    ctx.fillText('NonDa', W - 16, tableBottom + footerH * 0.62);

    ctx.strokeStyle = '#1e3a8a';
    ctx.lineWidth = 2;
    ctx.strokeRect(1, 1, W - 2, H - 2);

    return canvas;
}

function downloadImage() {
    if (!window._canvas) return;
    const name = (baseProductName || '스펙').replace(/\s+/g, '_');
    const link = document.createElement('a');
    link.download = `스펙_${name}.png`;
    link.href = window._canvas.toDataURL('image/png');
    link.click();
}
</script>
</body>
</html>
